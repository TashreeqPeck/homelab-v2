[global]
keyboard = "en-us"
country = "au"
fqdn = "pve01.lab.local"
mailto = "admin@example.local"
timezone = "Australia/Perth"
root-password = "{{ op://Homelab/ProxmoxRoot/password }}"

[network]
source = "from-dhcp"

[disk-setup]
filesystem = "xfs"
filter.DEVTYPE = "disk"

[post-installation-webhook]
url = "__PROXMOX_POST_INSTALL_WEBHOOK_URL__"

[first-boot]
source = "from-url"
url = "__PROXMOX_FIRST_BOOT_URL__"
